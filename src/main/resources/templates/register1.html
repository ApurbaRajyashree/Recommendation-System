<!DOCTYPE html>
<html lang="en"  xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Registration </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous">
</head>
<body>
<br/><br/><br/>
<div class="container">
  <div class="row col-md-8 offset-md-2">
    <div class="card">
      <div class="card-header">
        <h2 class="text-center">Registration</h2>
      </div>
      <div th:if="${param.success}">
        <div class="alert alert-info">
          You have successfully registered our app!
        </div>
      </div>
      <div th:if="${param.fail}">
        <div class="alert alert-danger" >
          <span th:text="${error}"></span>
        </div>
      </div>
      <div class="card-body">
        <form
                name="registration"
                method="post"
                role="form"
                onsubmit="return validateform()"
                th:action="@{/register/save}"
                th:object="${user}"
        >
          <div class="form-group mb-3">
            <label class="form-label">Full Name</label>
            <input
                    class="form-control"
                    id="inputFullName"
                    name="firstName"
                    placeholder="Enter full name"
                    th:field="*{userFullName}"
                    type="text"
                    required
            />
            <p th:errors="*{userFullName}" class="text-danger"
               th:if="${#fields.hasErrors('userFullName')}"></p>
          </div>

          <div class="form-group mb-3">
            <label class="form-label">Mobile Number</label>
            <input
                    class="form-control"
                    id="inputMobileNumber"
                    name="mobileNumber"
                    placeholder="Enter Mobile Number"
                    pattern="[9]{1}[0-9]{9}"
                    th:field="*{userMobileNumber}"
                    type="text"
                    required
            />
            <p th:errors="*{userMobileNumber}" class="text-danger"
               th:if="${#fields.hasErrors('userMobileNumber')}"></p>
          </div>

          <div class="form-group mb-3">
            <label class="form-label">College Name</label>
            <input
                    class="form-control"
                    id="inputCollegeName"
                    name="mobileNumber"
                    placeholder="Enter Designation"
                    th:field="*{collegeName}"
                    type="text"
                    required
            />
            <p th:errors="*{collegeName}" class="text-danger"
               th:if="${#fields.hasErrors('collegeName')}"></p>
          </div>
          <div class="form-group mb-3">
            <label class="form-label">College Address</label>
            <input
                    class="form-control"
                    id="inputCollegeAddress"
                    name="mobileNumber"
                    placeholder="Enter Designation"
                    th:field="*{collegeAddress}"
                    type="text"
                    required
            />
            <p th:errors="*{collegeAddress}" class="text-danger"
               th:if="${#fields.hasErrors('collegeAddress')}"></p>
          </div>

          <div class="form-group mb-3">
            <label class="form-label">Email</label>
            <input
                    class="form-control"
                    id="email"
                    name="email"
                    placeholder="Enter email address"
                    th:field="*{userEmail}"
                    type="email"
                    required
            />
            <p th:errors="*{userEmail}" class="text-danger"
               th:if="${#fields.hasErrors('userEmail')}"></p>
          </div>

          <div class="form-group mb-3">
            <label class="form-label">Department</label>
            <select
                    id="inputDepartment"
                    class="form-select" ,
                    th:field="*{department}"
                    required>
              <option value="0">select option</option>
              <option
                      th:each="department : ${departments}"
                      th:value="${department.id}"
                      th:text="${department.departmentName}"></option>
            </select>
            <p th:errors="*{department}" class="text-danger"
               th:if="${#fields.hasErrors('department')}"></p>

          </div>

          <div class="form-group mb-3">
            <label class="form-label">Password</label>
            <input
                    class="form-control"
                    id="password"
                    name="password"
                    placeholder="Enter password"
                    th:field="*{userPassword}"
                    type="password"
                    required
            />
            <p th:errors="*{userPassword}" class="text-danger"
               th:if="${#fields.hasErrors('userPassword')}"></p>
          </div>


          <div class="form-group">
            <button class="btn btn-primary" type="submit">Register</button>
            <span>Already registered? <a th:href="@{/login}">Login here</a></span>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>

  function validateform(){
    var num=document.registration.mobileNumber.value;
    var phoneno = /^\d{10}$/;
    if(num.value.match(phoneno))
    {
      return true;
    }
    else
    {
      alert("Please enter valid Mobile Number");
      return false;
    }

    var x=document.registration.email.value;
    var atposition=x.indexOf("@");
    var dotposition=x.lastIndexOf(".");
    if (atposition<1 || dotposition<atposition+2 || dotposition+2>=x.length){
      alert("Please enter a valid e-mail address");
      return false;
    } else{
      return true;
    }
  }
</script>
</body>
</html>
