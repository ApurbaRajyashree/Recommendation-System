<div class="u-align-center u-clearfix u-grey-5 u-section-1" id="sec-ef6c">
    <div class="u-clearfix u-sheet u-sheet-1">
        <div class="u-align-center u-container-align-center u-container-style u-expanded-width-xs u-group u-shape-rectangle u-group-1">
            <div class="u-container-layout u-container-layout-1">
                <div id="tostbox"></div>
                <h3 class="u-align-center u-custom-font u-font-montserrat u-text u-text-default u-text-1">Welcome
                    Back</h3>
                <div th:if="${param.success}" class="my-3">
                    <div class="alert alert-success alert-dismissible fade show" role="alert">
                        <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
                            <symbol id="check-circle-fill" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                            </symbol>
                        </svg>
                        <svg class="bi flex-shrink-0 me-2" width="24" height="24" role="img" aria-label="Success:">
                            <use xlink:href="#check-circle-fill"/>
                        </svg>

                        <span>You have successfully added a new department!</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                </div>


                <div th:if="${param.fail}" class="my-3">
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
                            <symbol id="exclamation-triangle-fill" viewBox="0 0 16 16">
                                <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                            </symbol>
                        </svg>
                        <svg class="bi flex-shrink-0 me-2" width="24" height="24" role="img" aria-label="Danger:">
                            <use xlink:href="#exclamation-triangle-fill"/>
                        </svg>


                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                </div>

                <div class="u-expanded-width u-form u-login-control u-white u-form-1">
                    <form
                            class="u-clearfix u-form-custom-backend u-form-spacing-20 u-form-vertical u-inner-form"
                            name="form"
                            role="form"
                            th:action="@{/login}"
                            style="padding: 30px;"
                            method="post">
                        <div class="u-form-group u-form-name">
                            <label for="username-a30d" class="u-label">Username *</label>
                            <input type="text" placeholder="Enter your Username" id="username-a30d" name="username"
                                   class="u-grey-5 u-input u-input-rectangle u-input-1" required="">
                        </div>
                        <div class="u-form-group u-form-password">
                            <label for="password-a30d" class="u-label">Password *</label>
                            <input type="password"
                                   placeholder="Enter your Password"
                                   id="password-a30d"
                                   name="password"
                                   class="u-grey-5 u-input u-input-rectangle u-input-2" required="">
                        </div>
                        <div class="u-align-right u-form-group u-form-submit">
                            <button type="submit" value="submit"
                                    class="u-button-style u-palette-3-base u-btn-1 btn btn-primary"
                                    onclick="showToast()">Sign in
                            </button>
                        </div>
                    </form>
                </div>
                <a href="#"
                   class="u-align-center u-border-active-palette-2-base u-border-hover-palette-1-base u-border-none u-btn u-button-style u-login-control u-login-forgot-password u-none u-text-grey-40 u-text-hover-palette-4-base u-btn-2">Forgot
                    password?</a>
                <a th:href="@{/register}"
                   class="u-align-center   u-border-none u-btn u-button-style u-login-control u-login-create-account u-none u-text-grey-40 u-text-hover-palette-4-base u-btn-3">Don't
                    have an account?</a>
            </div>
        </div>
    </div>
</div>
<script>
    let toastBox = document.getElementById('toastBox');
    let successMsg=

    function showToast() {
        let toast = document.createElement('div');
        toast.classList.add('toast');
        toast.innerHTML = 'success';
        toastBox.appendChild(toast);
    }
</script>
