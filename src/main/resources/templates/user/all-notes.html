<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">

<head>
    <!--  title and bootstrap link-->
    <th:block th:replace="~{external/fragments/html-head :: html_head('create-post')}"></th:block>

    <link rel="stylesheet" type="text/css" th:href="@{/css/create-post.css}">

</head>
<body>
<div class="container-fluid">
    <div class="row">

        <div th:replace="~{external/fragments/sidebar :: sidebar}"> </div>


        <!--        SUCCESS OR FAILED FILE UPLOAD INDICATION -->

        <div class="col-md-10 border mx-auto">
            <div class="user_table_post  mt-5">
                <div class="MPOS">Note
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered table-striped mt-3" >
                        <thead>
                        <tr>

                            <th>S.N.</th>
                            <th>Author</th>
                            <th>Title</th>
                            <th>Description</th>
                            <th>File</th>
                            <th>Date-Time</th>
                            <th>Course</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody th:each="note,Index:${notes}">
                        <tr >
                            <td th:text="${Index.count}"></td>
                            <td th:text="${note.getUser().getUserFullName()}"></td>
                            <td th:text="${note.getNoteTitle()}"></td>
                            <td th:text="${note.getNoteDescription()}"></td>
                            <td><a th:href="@{'/download/'+${note.id}}" th:text="${note.filePath}"></a></td>
                            <td th:text="${note.getDateOfNoteCreation()}"></td>
                            <td th:text="${note.getCourse().courseName}"></td>

                            <td>

                                <!--                <a th:href="@{'/user/note/'+${note.id}+'/note'}">-->
                                <!--                  <i class="fa-solid fa-trash" style="color: #f50025;"></i>-->
                                <!--                </a>-->
                            </td>
                        </tr>

                        </tbody>
                    </table>
                </div>

            </div>

        </div>
    </div>


    <div th:replace="~{external/fragments/logout-popup :: popup}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
            crossorigin="anonymous"></script>
</div>
</body>

</html>
